<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap - Programmind</title>
    <link rel="stylesheet" href="reset.css">
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }


        a {
            text-decoration: none;
            color: inherit;
        }

        /* ===== HERO ===== */
        .header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
        }

        .header h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            max-width: 500px;
            margin: auto;
        }


        /* ===== GRID ===== */
        .container {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* ===== CARD ===== */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            margin-bottom: 8px;
            font-size: 18px;
        }

        .card p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #94a3b8;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <div class="logo">Programmind</div>

        <nav id="nav">
            <a href="index.html">Home</a>
            <a href="index.html">Blog</a>
            <a href="https://whois65.github.io/portfolio/">About</a>
            <a href="https://whois65.github.io/portfolio/#contact">Contact</a>
            <button class="toggle" onclick="toggleDark()">🌙</button>
        </nav>

        <div class="hamburger" onclick="document.getElementById('nav').classList.toggle('active')">
            <span></span>
            <span></span>
            <span></span>
        </div>

    </header>

    <main>
        <!-- HERO -->
        <section class="header">
            <h2>Learning Roadmap</h2>
            <p>
                A structured path to master subjects step by step.
                Stay consistent, keep improving, and build your future.
            </p>
        </section>

        <!-- ROADMAP GRID -->
        <section class="container"></section>
    </main>


    <!-- FOOTER -->
    <footer>
        © 2026 Programmind. Built for growth.
    </footer>
    <script>
        const roadmaps = [
            {
                subject: "Mathematics",
                url: "",
                description: "Build strong logical thinking and problem-solving skills."
            },
            {
                subject: "English",
                url: "",
                description: "Improve communication, writing, and global understanding."
            },
            {
                subject: "Indonesian",
                url: "",
                description: "Strengthen formal writing and academic language skills."
            },
            {
                subject: "Physics",
                url: "",
                description: "Understand the laws of nature and how the universe works."
            },
            {
                subject: "Chemistry",
                url: "",
                description: "Explore matter, reactions, and atomic structures."
            },
            {
                subject: "Japanese",
                url: "",
                description: "Master grammar, kanji, and real-life conversation."
            },
            {
                subject: "Mandarin",
                url: "",
                description: "Learn tones, characters, and daily communication."
            },
            {
                subject: "Programming",
                url: "",
                description: "Build software, solve problems, and create projects."
            },
            {
                subject: "Cybersecurity",
                url: "",
                description: "Understand systems, networks, and digital security."
            },
            {
                subject: "Economics",
                url: "",
                description: "Understand macroeconomics, stock, currency and gold"
            }
        ]
        roadmaps.forEach(roadmap => {
            let a = document.createElement("a");
            a.innerHTML = `
            <div class="card">
                <h3>${roadmap.subject}</h3>
                <p>${roadmap.description}</p>
            </div>`;
            document.querySelector(".container").appendChild(a)
        });
    </script>
    <script src="dark.js"></script>
</body>

</html>
